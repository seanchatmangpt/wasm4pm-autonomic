[project]
name = "unibit"

[ontology]
source = "ontology/unibit.ttl"
format = "turtle"

[generation]
output_dir = "."

[[generation.rules]]
name = "workspace"
query = "sparql/workspace.rq"
template = "templates/Cargo.toml.njk"
output_file = "Cargo.toml"

[[generation.rules]]
name = "toolchain"
query = "sparql/toolchain.rq"
template = "templates/rust-toolchain.toml.njk"
output_file = "rust-toolchain.toml"

[[generation.rules]]
name = "crate_cargo"
query = "sparql/crates.rq"
template = "templates/crate-Cargo.toml.njk"
output_file = "{{ crate_path }}/Cargo.toml"

[[generation.rules]]
name = "crate_lib"
query = "sparql/modules.rq"
template = "templates/crate-lib.rs.njk"
output_file = "{{ crate_path }}/src/lib.rs"

[[generation.rules]]
name = "module"
query = "sparql/modules.rq"
template = "templates/module.rs.njk"
output_file = "{{ module_path }}"

[[generation.rules]]
name = "lexicon_check"
query = "sparql/lexicon.rq"
template = "templates/check-lexicon.mjs.njk"
output_file = "bin/check-lexicon.mjs"