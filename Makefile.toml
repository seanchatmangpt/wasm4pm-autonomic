[config]
default_to_workspace = false
skip_core_tasks = true

[env]
RUST_BACKTRACE = "1"
CARGO_TERM_COLOR = "always"

[tasks.default]
alias = "help"

[tasks.help]
description = "List all available tasks."
command = "cargo"
args = ["make", "--list-all-steps"]

# --- CI & Pipelines ---

[tasks.ci]
description = "Standard CI pipeline: formatting, linting, building, and testing."
dependencies = [
  "fmt-check",
  "lint",
  "check",
  "test",
  "conformance-replay",
  "boundary-tests",
  "dendral-bundle-roundtrip",
  "pack-coverage",
  "claude-md-fresh",
  "bench-baseline-compare",
]

# --- Phase 12 / cross-cutting ccog tasks ---

[tasks.miri]
description = "Run miri on ccog mask/BarkDecision/PackedKeyTable/conformance (UB-free verification). Not in default ci — separate task."
toolchain = "nightly"
command = "cargo"
args = ["miri", "test", "-p", "ccog", "--lib", "--", "mask", "decide", "packed_key_table", "conformance"]

[tasks.conformance-replay]
description = "Verify decide() and decide_with_trace() agree across the full input space (Phase 7)."
command = "cargo"
args = ["test", "-p", "ccog", "--test", "decide_eq_with_trace", "--", "--nocapture"]

[tasks.boundary-tests]
description = "Run every load-bearing boundary detector test in ccog (Chicago TDD)."
script_runner = "@shell"
script = '''
cargo test -p ccog --tests --features native -- \
  does_not_ \
  emits_ \
  not_shacl_ \
  boundary_ \
  --nocapture
'''

[tasks.dendral-bundle-roundtrip]
description = "Write a DENDRAL proof bundle, mutate variants, verify replay verdict (Phase 11)."
command = "cargo"
args = ["test", "-p", "ccog", "--test", "dendral_bundle_roundtrip", "--features", "dendral-cli", "--", "--nocapture"]

[tasks.pack-coverage]
description = "Run every Phase-12 pack conformance suite (lifestyle, edge, enterprise, dev) + cross-pack isolation."
script_runner = "@shell"
script = '''
cargo test -p ccog --test pack_lifestyle_conformance -- --nocapture
cargo test -p ccog --test pack_edge_conformance -- --nocapture
cargo test -p ccog --test pack_enterprise_conformance -- --nocapture
cargo test -p ccog --test pack_dev_conformance -- --nocapture
cargo test -p ccog --test pack_namespace_isolation -- --nocapture
'''

[tasks.claude-md-fresh]
description = "Reject CLAUDE.md if its grep-named tests no longer exist or its module map is stale."
script_runner = "@shell"
script = '''
set -e
# Confirm the constitutional names still resolve.
grep -q '_does_not_' crates/ccog/src/hooks.rs || { echo "boundary detector names missing in hooks.rs"; exit 1; }
grep -q 'pub mod packs' crates/ccog/src/lib.rs || { echo "packs module not exported from ccog::lib"; exit 1; }
grep -q 'Do Not' crates/ccog/CLAUDE.md || { echo "CLAUDE.md missing 'Do Not' section"; exit 1; }
echo "CLAUDE.md fresh."
'''

[tasks.bench-baseline-compare]
description = "Smoke-run pack benches to confirm they compile and complete within order-of-magnitude budget."
script_runner = "@shell"
script = '''
cargo bench -p ccog --bench pack_lifestyle_bench -- --quick --warm-up-time 1 --measurement-time 2 || true
cargo bench -p ccog --bench pack_edge_bench -- --quick --warm-up-time 1 --measurement-time 2 || true
cargo bench -p ccog --bench pack_enterprise_bench -- --quick --warm-up-time 1 --measurement-time 2 || true
cargo bench -p ccog --bench pack_dev_bench -- --quick --warm-up-time 1 --measurement-time 2 || true
echo "pack bench smoke complete."
'''

[tasks.pre-merge]
description = "Comprehensive pre-merge verification pipeline (CI + Doc + DoD + Doctor)."
dependencies = ["ci", "doc", "dod", "doctor"]

# --- Code Quality ---

[tasks.fmt]
description = "Format the codebase."
install_crate = "rustfmt"
command = "cargo"
args = ["fmt", "--all"]

[tasks.fmt-check]
description = "Check formatting without making changes."
install_crate = "rustfmt"
command = "cargo"
args = ["fmt", "--all", "--", "--check"]

[tasks.lint]
description = "Lint the codebase and deny warnings."
install_crate = "clippy"
command = "cargo"
args = ["clippy", "--all-targets", "--features", "native", "--", "-D", "warnings"]

[tasks.audit]
description = "Audit dependencies for security vulnerabilities."
install_crate = "cargo-audit"
command = "cargo"
args = ["audit"]

# --- Build & Check ---

[tasks.check]
description = "Run fast compilation check."
command = "cargo"
args = ["check", "--all-targets", "--features", "native"]

[tasks.build]
description = "Build the project in release mode."
command = "cargo"
args = ["build", "--release", "--features", "native"]

[tasks.build-debug]
description = "Build the project in debug mode."
command = "cargo"
args = ["build"]

[tasks.wasm-build]
description = "Build the project for WebAssembly (wasm32-unknown-unknown) in release mode."
command = "cargo"
args = ["build", "--target", "wasm32-unknown-unknown", "--release"]

[tasks.wasm-check]
description = "Run fast compilation check for WebAssembly (wasm32-unknown-unknown)."
command = "cargo"
args = ["check", "--target", "wasm32-unknown-unknown"]

# --- Testing & Benchmarking ---

[tasks.test]
description = "Run the library test suite."
command = "cargo"
args = ["test", "--lib", "--features", "native", "--", "--nocapture"]

[tasks.test-all]
description = "Run all tests including doc tests and integration tests."
command = "cargo"
args = ["test", "--all-targets", "--features", "native", "--", "--nocapture"]

[tasks.bench]
description = "Run the performance benchmarks."
command = "cargo"
args = ["bench"]

# --- Project Specific ---

[tasks.doctor]
description = "Epistemic diagnostic: is your AutoML pipeline slow, redundant, biased, or lying?"
command = "cargo"
args = ["run", "--bin", "doctor", "--release", "--quiet"]

[tasks.doctor-dev]
description = "Epistemic diagnostic (debug build, faster compile)."
command = "cargo"
args = ["run", "--bin", "doctor", "--quiet"]

[tasks.doctor-target]
description = "Check all plans meet a target deployment tier. Set TARGET=T1 (or T0/T2/Warm)."
command = "cargo"
args = ["run", "--bin", "doctor", "--release", "--quiet", "--", "--target=${TARGET}"]

[tasks.doctor-target.env]
TARGET = "T1"

[tasks.doctor-json]
description = "Epistemic diagnostic output as JSON (for CI pipeline integration)."
command = "cargo"
args = ["run", "--bin", "doctor", "--release", "--quiet", "--", "--json"]

[tasks.plan-diff]
description = "Compare two AutoML plan runs for regressions. Set DIR_A and DIR_B."
command = "cargo"
args = ["run", "--bin", "plan_diff", "--release", "--quiet", "--", "--dir-a=${DIR_A}", "--dir-b=${DIR_B}"]

[tasks.plan-diff.env]
DIR_A = "artifacts/pdc2025/automl_plans"
DIR_B = "artifacts/pdc2025/automl_plans"

[tasks.plan-schema]
description = "Print the JSON Schema 2020-12 for AutomlPlan artifacts."
command = "cargo"
args = ["run", "--bin", "plan_schema", "--release", "--quiet"]

[tasks.plan-report]
description = "Generate standalone HTML report from AutoML plan artifacts."
command = "cargo"
args = ["run", "--bin", "plan_report", "--release", "--quiet"]

[tasks.run]
description = "Start the autonomic live loop simulation."
command = "cargo"
args = ["run", "--example", "autonomic_runner"]

[tasks.run.env]
RUST_LOG = "info"

# --- PDC 2025 ---

[tasks.pdc]
description = "Run the PDC 2025 process discovery pipeline (all strategies, release build)."
command = "cargo"
args = ["run", "--bin", "pdc2025", "--release"]

[tasks.pdc.env]
RUST_LOG = "info"

[tasks.pdc-debug]
description = "Run PDC 2025 pipeline in debug mode (fast build, for iteration)."
command = "cargo"
args = ["run", "--bin", "pdc2025"]

[tasks.pdc-debug.env]
RUST_LOG = "info"

[tasks.pdc-stem]
description = "Run PDC 2025 on one log. Set STEM=pdc2025_000000 before calling."
command = "cargo"
args = ["run", "--bin", "pdc2025", "--release", "--", "--stem=${STEM}"]

[tasks.pdc-stem.env]
RUST_LOG = "info"
STEM = "pdc2025_000000"

[tasks.pdc-check-data]
description = "Verify PDC 2025 dataset directories exist."
script_runner = "@shell"
script = [
  "[ -d data/pdc2025/test_logs ]     && echo '✓ test_logs'     || { echo '✗ test_logs missing';     exit 1; }",
  "[ -d data/pdc2025/models ]        && echo '✓ models'         || { echo '✗ models missing';         exit 1; }",
  "[ -d data/pdc2025/ground_truth ]  && echo '✓ ground_truth'   || { echo '✗ ground_truth missing';   exit 1; }",
  "[ -d data/pdc2025/training_logs ] && echo '✓ training_logs'  || { echo '✗ training_logs missing';  exit 1; }",
  "echo 'PDC 2025 data structure OK'",
]

[tasks.doc]
description = "Generate the whitepaper PDF using pdflatex."
script_runner = "@shell"
script = '''
if ! command -v pdflatex > /dev/null 2>&1; then
    echo "pdflatex not found. Skipping PDF generation."
    exit 0
fi
echo "Generating dteam whitepaper..."
pdflatex -interaction=nonstopmode -halt-on-error -output-directory=docs/thesis docs/thesis/main.tex > /dev/null
pdflatex -interaction=nonstopmode -halt-on-error -output-directory=docs/thesis docs/thesis/main.tex > /dev/null
mv docs/thesis/main.pdf docs/thesis/dteam-whitepaper.pdf
echo "Whitepaper successfully generated at docs/thesis/dteam-whitepaper.pdf"
'''

[tasks.dod]
description = "Definition of Done — verify compile, tests, and AutoML pipeline artifact invariants."
command = "cargo"
args = ["run", "--bin", "dod", "--release", "--quiet"]

[tasks.dod-dev]
description = "Definition of Done (dev build — faster iteration)."
command = "cargo"
args = ["run", "--bin", "dod", "--quiet"]

[tasks.clean]
description = "Clean cargo artifacts and generated documentation."
script_runner = "@shell"
script = '''
cargo clean
echo "Cleaning thesis artifacts..."
rm -f docs/thesis/*.aux docs/thesis/*.log docs/thesis/*.out docs/thesis/*.toc docs/thesis/*.pdf docs/thesis/*.lot docs/thesis/*.swp
echo "Clean complete."
'''
